<header id="menu">
  <div class="header-wrapper">
    <nav class="main-nav">
      <a href="{{ site.url }}" title="Go to home page" class="logo-link">
        <img width="206" alt="PM2 logo" src="{{ site.url }}/assets/pm2-logo-1.png" />
      </a>
      <div class="menu">
        <a
          title="Open menu"
          href="#menu"
          class="button accent-border border-corners inner-shadows menu-button"
        >
          <div class="menu-icon"></div>
        </a>
        <a class="menu-overlay" href="#" title="Close the menu"></a>
        <div class="menu-content">
          <div class="doc-links">
            <a
              href="{{ site.url }}/"
              title="Go to Home"
              class="{% if page.url == '/' %}current{% endif %}"
            >
              Home
            </a>
            <a
              href="{{ site.url }}/pricing"
              title="Go to Pricing"
              class="{% if page.url == '/pricing' %}current{% endif %}"
              >
              Pricing
            </a>
            <a
              href="{{ site.url }}/contact"
              title="Go to Contact"
              class="{% if page.url == '/contact' %}current{% endif %}"
            >
              Contact
            </a>
            <a
              href="/docs/plus/overview/"
              title="Go to Documentation"
            >
              Documentation
            </a>
          </div>
          <a
            href="https://github.com/Unitech/pm2"
            target="_blank"
            rel="noopener"
            title="PM2 on GitHub"
            aria-label="PM2 on GitHub"
            class="github-link"
          >
            <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
          </a>
          <a
            href="{{ site.login_url }}"
            title="Get started"
            class="button accent-border border-corners inner-shadows"
            data-track-cross-site
            data-tracking-event="header_login_clicked"
          >
            Login
          </a>
        </div>
      </div>
    </nav>
  </div>
</header>
