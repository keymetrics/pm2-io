<url>
  <loc>{{ site.url }}{{ include.url }}</loc>
  <lastmod>{{ site.time | date_to_xmlschema }}</lastmod>
  <changefreq>{% if include.url == '/' %}weekly{% else %}monthly{% endif %}</changefreq>
  <priority>{% if include.url == '/' %}1.0{% elsif include.url contains '/pricing' or include.url contains '/contact' %}0.9{% else %}0.8{% endif %}</priority>
</url>
